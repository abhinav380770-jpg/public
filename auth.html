<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup | Ginger Tea Crochet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Ginger Tea Crochet 🧶</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <section class="section">
        <div class="contact-container">
            <div style="display: flex; justify-content: space-around; margin-bottom: 20px;">
                <button onclick="showForm('login')" id="login-tab" class="cta-btn">Login</button>
                <button onclick="showForm('signup')" id="signup-tab" class="cta-btn" style="background-color: transparent; color: #5d4037; border: 1px solid #5d4037;">Sign Up</button>
            </div>

            <form id="login-form">
                <h3 style="text-align: center; margin-bottom: 15px;">Welcome Back</h3>
                <input type="email" id="login-email" placeholder="Email Address" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="cta-btn">Login</button>
            </form>

            <form id="signup-form" style="display: none;">
                <h3 style="text-align: center; margin-bottom: 15px;">Create Account</h3>
                <input type="text" id="signup-name" placeholder="Full Name" required>
                <input type="email" id="signup-email" placeholder="Email Address" required>
                <input type="password" id="signup-password" placeholder="Create Password" required>
                <button type="submit" class="cta-btn">Register</button>
            </form>
        </div>
    </section>

    <script>
        // Toggle between Login and Signup forms
        function showForm(formType) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const loginTab = document.getElementById('login-tab');
            const signupTab = document.getElementById('signup-tab');

            if (formType === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                loginTab.style.backgroundColor = '#5d4037';
                loginTab.style.color = '#fff';
                signupTab.style.backgroundColor = 'transparent';
                signupTab.style.color = '#5d4037';
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                signupTab.style.backgroundColor = '#5d4037';
                signupTab.style.color = '#fff';
                loginTab.style.backgroundColor = 'transparent';
                loginTab.style.color = '#5d4037';
            }
        }

        // Handle Signup
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('signup-name').value,
                email: document.getElementById('signup-email').value,
                password: document.getElementById('signup-password').value
            };
            const response = await fetch('https://public-7vab.onrender.com/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                alert('✅ Success! You can now login.');
                showForm('login');
            } else {
                alert('❌ Signup failed.');
            }
        });

        // Handle Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            };
            const response = await fetch('https://public-7vab.onrender.com/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('user', JSON.stringify(data.user));
                alert('✅ Welcome, ' + data.user.name);
                window.location.href = 'index.html';
            } else {
                alert('❌ Invalid credentials.');
            }
        });
    </script>
</body>
</html>
