<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Ginger Tea Crochet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Ginger Tea Blog 🧶</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">🧶Custom Order</a></li>
                <li><a href="cart.html" class="cart-link">🛒 Cart (<span id="cart-count">0</span>)</a></li>
            </ul>
        </nav>
    </header>

    <section class="section">
        <h2 class="section-title">Latest from Ginger Tea</h2>
        <div class="grid">
            <article class="card">
                <div style="padding: 20px;">
                    <small>February 25, 2026</small>
                    <h3>My Crochet Journey: From Yarn to Store</h3>
                    <p>hi guys im malavika padava.</p>
                    <a href="#" class="cta-btn" style="display: inline-block; margin-top: 10px; font-size: 0.8rem;">Read More</a>
                </div>
            </article>
        </div>
    </section>

    <footer>
        <p>Made with ❤️ in Hyderabad</p>
        <p>Created by Malavika Padava</p>
        <p>&copy; 2026 Ginger Tea Crochet</p>
    </footer>

    <script>
        // Keeping the cart count synced across pages
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('gingerCart')) || [];
            const countElement = document.getElementById('cart-count');
            if (countElement) {
                countElement.innerText = cart.length;
            }
        }
        updateCartCount();
       function updateNavBar() {
    const user = JSON.parse(localStorage.getItem('user'));
    const navLinks = document.querySelector('.nav-links');
    
    if (user) {
        // Find and remove the Login link if it exists
        const loginLink = Array.from(navLinks.querySelectorAll('a')).find(a => a.getAttribute('href') === 'auth.html');
        if (loginLink) loginLink.parentElement.remove();

        // Add Profile and Logout links
        navLinks.innerHTML += `
            <li><a href="profile.html">My Profile</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        `;
    }
}

function logout() {
    localStorage.removeItem('user');
    window.location.href = 'index.html';
}

updateNavBar();

    </script>
</body>
</html>
