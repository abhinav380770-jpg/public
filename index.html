<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ginger Tea Crochet | Handmade Art</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">Ginger Tea Crochet 🧶</div>
            <div class="sublogo">by malavika padava</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#shop">Shop</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#contact">Custom Order</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Stitched with Love & Ginger Tea</h1>
            <p>Unique, handmade crochet creations delivered from my hook to your home.</p>
            <a href="#shop" class="cta-btn">Browse Shop</a>
        </div>
    </section>

    <section id="contact" class="section alt-bg">
        <h2 class="section-title">Request a Custom Creation</h2>
        <div class="contact-container">
            <form id="crochet-form">
                <input type="text" id="customer-name" placeholder="Your Name" required>
                <input type="email" id="customer-email" placeholder="Your Email" required>
                <select id="order-category" required>
                    <option value="">Select Category</option>
                    <option value="plushie">Amigurumi/Plushie</option>
                    <option value="wearable">Wearable (Top/Hat)</option>
                    <option value="home">Home Decor</option>
                </select>
                <textarea id="order-desc" placeholder="Describe your dream crochet project" required></textarea>
                <button type="submit" class="cta-btn">Send Request</button>
            </form>
        </div>
    </section>

    <footer>
        <p>Made with ❤️ in Hyderabad</p>
        <p>&copy; 2026 Ginger Tea Crochet</p>
    </footer>

    <script>
        document.getElementById('crochet-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const now = new Date();
            const options = { timeZone: 'Asia/Kolkata' };
            
            // Collects all data including precise Hyderabad time
            const formData = {
                name: document.getElementById('customer-name').value,
                email: document.getElementById('customer-email').value,
                category: document.getElementById('order-category').value,
                description: document.getElementById('order-desc').value,
                orderDate: now.toLocaleDateString('en-IN', options),
                orderTime: now.toLocaleTimeString('en-IN', { ...options, hour: '2-digit', minute: '2-digit' })
            };

            try {
                // Fixed URL to match your LIVE Render service
                const response = await fetch('https://public-naxb.onrender.com/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert('✅ Order submitted successfully! Check MongoDB Atlas.');
                    e.target.reset();
                } else {
                    alert('❌ Submission failed. Check your Render logs.');
                }
            } catch (err) {
                console.error('Fetch error:', err);
                alert('❌ Could not connect to the server.');
            }
        }); // Closing brackets correctly added here
    </script>
</body>
</html>
